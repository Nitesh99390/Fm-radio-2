<!DOCTYPE html>
<html lang="hi">
<head>
    <meta name="google-site-verification" content="Za1pEupQLM-LlPnODka_5pMgrC6DyOzmuDaZBepfg7Q" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>✨ Live India & Global Radio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0a0f0f;
            color: #e0f2fe;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .glass-box {
            background: rgba(10, 20, 20, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid #22d3ee33;
            border-radius: 32px;
            padding: 28px 20px;
            box-shadow: 0 15px 35px rgba(0, 243, 255, 0.2), 0 0 0 1px #22d3ee22 inset;
            max-width: 500px;
            width: 100%;
            transition: box-shadow 0.3s;
        }

        .glass-box:hover {
            box-shadow: 0 20px 40px rgba(0, 243, 255, 0.3);
        }

        h2 {
            font-weight: 400;
            font-size: 2rem;
            letter-spacing: 2px;
            text-align: center;
            color: #a5f3fc;
            text-shadow: 0 0 10px #00e0ff, 0 0 20px #00b7ff;
            margin-bottom: 8px;
        }

        .sub {
            text-align: center;
            font-size: 0.85rem;
            color: #7dd3fc;
            margin-bottom: 24px;
            border-bottom: 1px dashed #22d3ee50;
            padding-bottom: 12px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 2;
            min-width: 180px;
            background: #111a1c;
            border: 1px solid #22d3ee;
            border-radius: 40px;
            padding: 14px 18px;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: #a5f3fc;
            box-shadow: 0 0 12px #00e0ff;
            background: #0b1c1f;
        }

        .input-group button {
            flex: 1;
            background: #0e2a2f;
            border: 1px solid #22d3ee;
            border-radius: 40px;
            padding: 12px 16px;
            color: #b6e6ff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: 0.2s;
            white-space: nowrap;
        }

        .input-group button:hover {
            background: #1a4048;
            border-color: #a5f3fc;
            color: white;
            box-shadow: 0 0 12px #00e0ff;
        }

        .loader {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #fcd34d;
            font-size: 0.95rem;
            margin: 8px 0 16px;
            background: #0f1e20;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #fbbf2440;
        }

        .loader .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #fcd34d30;
            border-top-color: #fcd34d;
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .station-select {
            width: 100%;
            background: #0b1a1d;
            border: 1px solid #3b9eae;
            border-radius: 40px;
            padding: 14px 20px;
            color: #e2f3f5;
            font-size: 1rem;
            margin: 10px 0 16px;
            cursor: pointer;
            outline: none;
            transition: 0.2s;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2322d3ee' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 18px center;
            background-size: 18px;
        }

        .station-select:focus {
            border-color: #a5f3fc;
            box-shadow: 0 0 12px #00e0ff;
        }

        .station-select option {
            background: #10272b;
            color: #f0fcff;
            padding: 10px;
        }

        .now-playing-card {
            background: #071416c0;
            border-radius: 28px;
            padding: 18px 16px;
            margin: 16px 0 20px;
            border: 1px solid #3198a8;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .live-badge {
            background: #bc4e9c;
            background: linear-gradient(145deg, #f43f5e, #bc4e9c);
            border-radius: 40px;
            padding: 4px 14px;
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 12px #f43f5e;
        }

        .station-info {
            flex: 1;
            font-size: 1.2rem;
            font-weight: 500;
            word-break: break-word;
            color: #bae6fd;
            text-shadow: 0 0 5px #00c8ff;
        }

        .station-info small {
            font-size: 0.8rem;
            color: #87c7ee;
            display: block;
        }

        .stop-btn {
            background: #2d1c28;
            border: 1px solid #fb7185;
            border-radius: 40px;
            padding: 8px 22px;
            color: #ffb3c6;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .stop-btn:hover {
            background: #a63e52;
            color: white;
            border-color: #fda4af;
            box-shadow: 0 0 12px #f43f5e;
        }

        .audio-player {
            width: 100%;
            margin: 12px 0 8px;
            filter: drop-shadow(0 0 8px #00bbff80);
            border-radius: 40px;
            background: #0a1a1e;
        }

        .audio-player::-webkit-media-controls-panel {
            background: #143238;
        }

        .hint {
            font-size: 0.8rem;
            color: #63b3d1;
            text-align: center;
            margin-top: 20px;
            border-top: 1px dashed #2a6f7a;
            padding-top: 14px;
        }

        .error-message {
            color: #fda4af;
            background: #2f1a20;
            border-radius: 40px;
            padding: 10px 16px;
            margin: 12px 0;
            border: 1px solid #f87171;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="glass-box">
    <h2>🎧 WORLD RADIO</h2>
    <div class="sub">India के 1300+ स्टेशन • लाइव स्ट्रीम</div>

    <div class="input-group">
        <input type="text" id="searchInput" placeholder="खोजें (जैसे Bollywood, Hindi, India)..." value="India">
        <button id="loadBtn">🔍 लोड करें</button>
    </div>

    <!-- लोडिंग इंडिकेटर -->
    <div id="loader" class="loader">
        <div class="spinner"></div>
        <span>स्टेशन ढूंढे जा रहे हैं...</span>
    </div>

    <!-- स्टेशन ड्रॉपडाउन -->
    <select id="stationList" class="station-select">
        <option value="">📻 स्टेशन चुनें</option>
    </select>

    <!-- अब क्या बज रहा है – कार्ड -->
    <div class="now-playing-card" id="nowPlayingCard" style="display: none;">
        <span class="live-badge">LIVE</span>
        <div class="station-info" id="stationInfo">
            कोई स्ट्रीम नहीं
            <small id="stationCountry"></small>
        </div>
        <button class="stop-btn" id="stopBtn">⏹️ बंद करें</button>
    </div>

    <!-- ऑडियो प्लेयर -->
    <audio id="player" class="audio-player" controls preload="none"></audio>

    <div class="hint">
        ✦ लोकप्रिय भारतीय स्टेशन स्वतः लोड होंगे ✦ स्ट्रीम चुनें और मज़े करें ✦
    </div>
</div>

<script>
    (function() {
        // DOM elements
        const player = document.getElementById('player');
        const stationList = document.getElementById('stationList');
        const loader = document.getElementById('loader');
        const searchInput = document.getElementById('searchInput');
        const loadBtn = document.getElementById('loadBtn');
        const nowPlayingCard = document.getElementById('nowPlayingCard');
        const stationInfo = document.getElementById('stationInfo');
        const stationCountry = document.getElementById('stationCountry');
        const stopBtn = document.getElementById('stopBtn');

        let currentStationName = '';
        let currentStationCountry = '';

        // -- यूटिलिटी फंक्शन --
        function showLoader(show) {
            loader.style.display = show ? 'flex' : 'none';
        }

        function setError(message) {
            // पुराना error हटाएं
            const existingError = document.querySelector('.error-message');
            if(existingError) existingError.remove();

            if (!message) return;
            const errDiv = document.createElement('div');
            errDiv.className = 'error-message';
            errDiv.innerText = '⚠️ ' + message;
            stationList.parentNode.insertBefore(errDiv, stationList.nextSibling);
            setTimeout(() => errDiv.remove(), 5000);
        }

        // स्टेशन लिस्ट को भरना
        async function fetchStations() {
            const query = searchInput.value.trim() || 'India';  // fallback
            showLoader(true);
            setError(''); // clear old error

            // ड्रॉपडाउन में loading message
            stationList.innerHTML = '<option value="">⌛ स्टेशन लोड हो रहे...</option>';
            stationList.disabled = true;

            try {
                // radio-browser API: search by name, limit 100, only working, sort by clicks
                const url = `https://de1.api.radio-browser.info/json/stations/search?name=${encodeURIComponent(query)}&limit=80&hidebroken=true&order=clickcount&reverse=true`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('सर्वर से कनेक्ट नहीं हो सका');
                const stations = await res.json();

                // फ़िल्टर: जिनके पास valid URL है और mp3 या m3u हो (वैकल्पिक)
                const validStations = stations.filter(s => s.url_resolved && (s.url_resolved.startsWith('http') && !s.url_resolved.includes(';')));

                stationList.innerHTML = '<option value="">-- स्टेशन चुनें --</option>';
                if (validStations.length === 0) {
                    stationList.innerHTML = '<option value="">❌ कोई स्टेशन नहीं मिला</option>';
                } else {
                    validStations.forEach(s => {
                        const opt = document.createElement('option');
                        opt.value = s.url_resolved;
                        let displayName = `${s.name} (${s.countrycode || '??'})`;
                        if (s.bitrate) displayName += ` [${s.bitrate} kbps]`;
                        if (displayName.length > 60) displayName = displayName.slice(0, 58) + '…';
                        opt.innerText = displayName;
                        stationList.appendChild(opt);
                    });
                }
            } catch (err) {
                console.error(err);
                setError('नेटवर्क एरर! कृपया पुनः प्रयास करें।');
                stationList.innerHTML = '<option value="">-- पुनः प्रयास करें --</option>';
            } finally {
                showLoader(false);
                stationList.disabled = false;
            }
        }

        // स्टेशन प्ले करें
        function playStation(url, name, country = '') {
            if (!url) return;

            currentStationName = name;
            currentStationCountry = country;

            // Update now playing card
            stationInfo.innerText = name;
            stationCountry.innerText = country ? `देश: ${country}` : '';
            nowPlayingCard.style.display = 'flex';

            // छोटा बफरिंग संदेश
            stationInfo.innerHTML = name + ' <span style="color:#fbbf24; font-size:0.9rem;">(कनेक्ट हो रहा...)</span>';

            player.src = url;
            player.play().catch(e => {
                console.warn('Playback failed:', e);
                stationInfo.innerText = '❌ स्ट्रीम ऑफलाइन या असमर्थ';
                stationCountry.innerText = 'दूसरा स्टेशन चुनें';
                // ड्रॉपडाउन रीसेट नहीं करते
            });

            // अगर प्ले सफल हो जाए
            player.onplaying = () => {
                stationInfo.innerText = currentStationName;
                stationCountry.innerText = country ? `🌍 ${country}` : 'लाइव';
            };

            player.onerror = () => {
                stationInfo.innerText = '⚠️ स्ट्रीम एरर';
                stationCountry.innerText = 'ऑफलाइन या असमर्थ';
            };
        }

        // ड्रॉपडाउन से चुनने पर
        function onStationSelect() {
            const selectedOption = stationList.options[stationList.selectedIndex];
            const url = selectedOption.value;
            if (!url) return;

            // नाम और देश निकालना (display text से)
            let fullText = selectedOption.innerText;
            // bitrate etc. हटाने की कोशिश
            const nameMatch = fullText.match(/^(.*?)\s*\(([A-Z]{2,3})\)?/);
            let name = fullText;
            let country = '';
            if (nameMatch) {
                name = nameMatch[1].trim();
                country = nameMatch[2];
            } else {
                // fallback
                name = fullText.split('[')[0].trim();
            }

            playStation(url, name, country);
        }

        // स्टॉप बटन
        function stopPlayback() {
            player.pause();
            player.src = '';
            player.load();
            nowPlayingCard.style.display = 'none';
            currentStationName = '';
        }

        // -- इवेंट लिसनर --
        loadBtn.addEventListener('click', fetchStations);
        stationList.addEventListener('change', onStationSelect);
        stopBtn.addEventListener('click', stopPlayback);

        // एंटर दबाने पर भी खोज
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchStations();
        });

        // पेज लोड पर India स्टेशन दिखाएँ
        window.addEventListener('load', () => {
            fetchStations();
        });

        // अगर प्लेयर में कोई एरर हो तो यूजर को बताएँ
        player.addEventListener('error', () => {
            if (currentStationName) {
                setError('स्ट्रीम नहीं चल पाई। दूसरा स्टेशन चुनें।');
            }
        });

        // बोनस: वॉल्यूम normal रखें
        player.volume = 0.8;
    })();
</script>
</body>
</html>
